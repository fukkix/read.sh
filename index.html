<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FIREADER</title>
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/app.css">
  
  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
  
  <div id="app">
    
    <!-- Top Header -->
    <header>
      <div class="tab active">
        <span class="tab-icon">●</span>
        <span id="tab-name">~/welcome</span>
      </div>
      
      <div class="header-actions">
        <button id="btn-settings" class="btn-icon" title="Settings">⚙️</button>
        <button id="lang-toggle" class="btn-icon" title="Toggle Language">ZH</button>
      </div>
    </header>

    <!-- Main Workspace -->
    <main>
      
      <!-- Splash / Home Screen -->
      <div id="splash">
        <div class="logo-ascii">FIREADER_</div>
        <div class="splash-menu">
          
          <button class="cmd-btn" id="btn-random">
            <span class="key">🎲</span>
            <div>
              <div>$ random --wiki</div>
              <div class="cmd-desc">Get a random Wikipedia article</div>
            </div>
          </button>
          
          <button class="cmd-btn" id="btn-search">
            <span class="key">🔍</span>
            <div>
              <div>$ search --query</div>
              <div class="cmd-desc">Find specific knowledge</div>
            </div>
          </button>
          
          <button class="cmd-btn" id="btn-upload">
            <span class="key">📚</span>
            <div>
              <div>$ load ./book.epub</div>
              <div class="cmd-desc">Import local EPUB file</div>
            </div>
          </button>
          <input type="file" id="file-input" accept=".epub">
          
        </div>
      </div>
      
      <!-- Editor Area -->
      <div id="gutter"></div>
      <div id="editor-scroll">
        <div id="editor-content"></div>
      </div>
      
    </main>

    <!-- Footer / Status Bar -->
    <footer>
      <div class="status-left">
        <span class="status-btn" title="Reading Progress">
          <span id="progress-text">--%</span> 
          <span id="progress-bar">░░░░░░░░░░░░░░░░</span>
        </span>
      </div>
      <div class="status-right">
        <span id="btn-sync" class="status-btn" title="Sync to GitHub Gist">☁️ push</span>
        <span>UTF-8</span>
        <span>LF</span>
      </div>
    </footer>
    
  </div>

  <!-- Loading Overlay -->
  <div id="loader" class="loader-overlay">
    <div class="spinner"></div>
    <div id="loader-text" class="syn-num">> loading...</div>
  </div>

  <!-- Search Modal -->
  <div id="modal-search" class="modal-wrapper">
    <div class="cmd-palette">
      <input type="text" id="search-input" class="cmd-input" placeholder="> search wikipedia..." autocomplete="off">
      <div id="search-results" class="cmd-results"></div>
    </div>
  </div>

  <!-- Annotation Modal -->
  <div id="modal-annotate" class="modal-wrapper">
    <div class="cmd-palette">
      <div class="cmd-title" style="padding: 16px 16px 0;">// ADD ANNOTATION</div>
      <input type="text" id="annotate-input" class="cmd-input" placeholder="> type your note... (Enter to save)" autocomplete="off">
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="modal-settings" class="modal-wrapper">
    <div class="cmd-palette">
      <div class="cmd-title" style="padding: 16px 16px 0;">// GITHUB SYNC SETTINGS</div>
      <input type="password" id="setting-token" class="cmd-input" placeholder="> GitHub PAT (repo scope)...">
      <input type="text" id="setting-gist" class="cmd-input" placeholder="> Gist ID (leave empty to create)...">
      <div style="padding: 16px; text-align: right;">
        <button id="btn-save-settings" class="cmd-btn" style="display: inline-block;">Save & Close</button>
      </div>
    </div>
  </div>

  <!-- App Scripts -->
  <script src="js/db.js"></script>
  <script src="js/wikipedia.js"></script>
  <script src="js/highlighter.js"></script>
  <script src="js/epub.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/app.js"></script>
  
</body>
</html>
