<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>READ.SH</title>
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/app.css">
  
  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
  
  <div id="app">
    
    <!-- Top Header -->
    <header>
      <div class="tab active">
        <span class="tab-icon">●</span>
        <span id="tab-name">~/welcome</span>
      </div>
      
      <div class="header-actions">
        <button id="btn-toc" class="btn-icon d-none" title="Table of Contents">[ TOC ]</button>
        <button id="btn-epub-prev" class="btn-icon d-none" title="Prev Chapter">[ &lt; ]</button>
        <button id="btn-epub-next" class="btn-icon d-none" title="Next Chapter">[ &gt; ]</button>
        <button id="btn-home" class="btn-icon d-none" title="Home">[ HOME ]</button>
        <button id="btn-next" class="btn-icon d-none" title="Next Random">[ NEXT ]</button>
        <button id="btn-settings" class="btn-icon" title="Settings">[ SETTINGS ]</button>
        <button id="lang-toggle" class="btn-icon" title="Toggle Language">[ ZH ]</button>
      </div>
    </header>

    <!-- Main Workspace -->
    <main>
      
      <!-- Splash / Home Screen -->
      <div id="splash">
        <div class="logo-ascii">./read.sh</div>
        <div class="splash-menu">
          
          <button class="cmd-btn" id="btn-random">
            <span class="key">[ R ]</span>
            <div>
              <div>$ random --wiki</div>
              <div class="cmd-desc">Get a random Wikipedia article</div>
            </div>
          </button>
          
          <div class="domain-selector">
            <label><input type="radio" name="domain" value="any" checked> [ * ] ANY</label>
            <label id="btn-open-topics" style="cursor: pointer; color: var(--text-primary);">[ ≡ ] TOPICS: <span id="current-topic-label" style="color: var(--accent);">ANY</span></label>
            <!-- Hidden input to store selected topic -->
            <input type="hidden" id="selected-topic-val" value="any">
          </div>
          
          <button class="cmd-btn" id="btn-search">
            <span class="key">[ S ]</span>
            <div>
              <div>$ search --query</div>
              <div class="cmd-desc">Find specific knowledge</div>
            </div>
          </button>
          
          <button class="cmd-btn d-none" id="btn-continue">
            <span class="key">[ C ]</span>
            <div>
              <div>$ continue</div>
              <div class="cmd-desc">Resume: <span id="continue-title">...</span></div>
            </div>
          </button>
          
          <button class="cmd-btn" id="btn-upload">
            <span class="key">[ U ]</span>
            <div>
              <div>$ load ./file</div>
              <div class="cmd-desc">Import EPUB or Markdown</div>
            </div>
          </button>
          <button class="cmd-btn" id="btn-upload-folder">
            <span class="key">[ D ]</span>
            <div>
              <div>$ load ./vault/</div>
              <div class="cmd-desc">Import Obsidian vault folder</div>
            </div>
          </button>
          <input type="file" id="file-input" accept=".epub,.md,.markdown,.txt">
          <input type="file" id="folder-input" webkitdirectory>
          
        </div>
      </div>
      
      <!-- Editor Area -->
      <div id="gutter"></div>
      <div id="editor-scroll">
        <div id="editor-content"></div>
      </div>
      
    </main>

    <!-- Footer / Status Bar -->
    <footer>
      <div class="status-left">
        <span class="status-btn" title="Reading Progress">
          <span id="progress-text">--%</span> 
          <span id="progress-bar">░░░░░░░░░░░░░░░░</span>
        </span>
      </div>
      <div class="status-right">
        <span id="btn-sync" class="status-btn" title="Sync to GitHub Gist">[ PUSH ]</span>
        <span>UTF-8</span>
        <span>LF</span>
      </div>
    </footer>
    
  </div>

  <!-- Loading Overlay -->
  <div id="loader" class="loader-overlay">
    <div id="loader-text" class="syn-num" style="text-align: center; line-height: 1.5;">> loading...</div>
  </div>

  <!-- Search Modal -->
  <div id="modal-search" class="modal-wrapper">
    <div class="cmd-palette">
      <input type="text" id="search-input" class="cmd-input" placeholder="> search wikipedia..." autocomplete="off">
      <div id="search-results" class="cmd-results"></div>
    </div>
  </div>

  <!-- Annotation Modal -->
  <div id="modal-annotate" class="modal-wrapper">
    <div class="cmd-palette">
      <div class="cmd-title" style="padding: 16px 16px 0;">// ADD ANNOTATION</div>
      <input type="text" id="annotate-input" class="cmd-input" placeholder="> type your note... (Enter to save)" autocomplete="off">
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="modal-settings" class="modal-wrapper">
    <div class="cmd-palette">
      <div class="cmd-title" style="padding: 16px 16px 0;">// GITHUB SYNC SETTINGS</div>
      <input type="password" id="setting-token" class="cmd-input" placeholder="> GitHub PAT (repo scope)...">
      <input type="text" id="setting-gist" class="cmd-input" placeholder="> Gist ID (leave empty to create)...">
      <div style="padding: 16px; text-align: right;">
        <button id="btn-save-settings" class="cmd-btn" style="display: inline-block;">[ SAVE & CLOSE ]</button>
      </div>
      <div class="cmd-title" style="padding: 16px 16px 0; border-top: 1px solid var(--border);">// LOCAL HISTORY (OFFLINE)</div>
      <div id="history-list" class="cmd-results" style="max-height: 250px; overflow-y: auto;">
        <!-- Injected via JS -->
      </div>
    </div>
  </div>

  <!-- Topics Modal -->
  <div id="modal-topics" class="modal-wrapper">
    <div class="cmd-palette" style="max-width: 500px;">
      <div class="cmd-title" style="padding: 16px 16px 0;">// SELECT TOPIC DOMAIN</div>
      <div id="topic-grid" class="topic-grid">
        <!-- Injected via JS -->
      </div>
    </div>
  </div>

  <!-- TOC Modal -->
  <div id="modal-toc" class="modal-wrapper">
    <div class="cmd-palette" style="max-width: 500px; height: 80vh; display: flex; flex-direction: column;">
      <div class="cmd-title" style="padding: 16px 16px 0;">// TABLE OF CONTENTS</div>
      <div id="toc-list" class="cmd-results" style="flex: 1; overflow-y: auto; margin-top: 8px;">
        <!-- Injected via JS -->
      </div>
    </div>
  </div>

  <!-- Shortcut Legend -->
  <div id="shortcut-legend" class="shortcut-legend"></div>

  <!-- Toast Notifications -->
  <div id="toast-container" class="toast-container"></div>

  <!-- App Scripts -->
  <script src="js/db.js"></script>
  <script src="js/wikipedia.js"></script>
  <script src="js/highlighter.js"></script>
  <script src="js/epub.js"></script>
  <script src="js/markdown.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/app.js"></script>
  
</body>
</html>
