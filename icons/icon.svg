<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#070b0e"/>
  <!-- Terminal prompt > -->
  <text x="72" y="310" font-family="monospace" font-size="200" font-weight="700" fill="#528b9c">&#x276F;</text>
  <!-- Cursor block -->
  <rect x="302" y="170" width="110" height="160" fill="#528b9c" opacity="0.9"/>
  <!-- Code lines decoration -->
  <rect x="72" y="360" width="100" height="12" fill="#8cb8c9" opacity="0.6"/>
  <rect x="72" y="384" width="160" height="12" fill="#4b8587" opacity="0.5"/>
  <rect x="72" y="408" width="120" height="12" fill="#a08f73" opacity="0.4"/>
  <!-- Line number area -->
  <rect x="40" y="120" width="2" height="340" fill="#233842"/>
</svg>
